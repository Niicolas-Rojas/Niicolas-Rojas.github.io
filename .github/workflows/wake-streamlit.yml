name: wake-streamlit-apps

on:
  schedule:
    # Run every 6 hours. Streamlit Community Cloud hibernates public apps
    # after 12 hours without viewer traffic.
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: wake-streamlit-apps
  cancel-in-progress: false

jobs:
  wake:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright
        run: |
          npm init -y
          npm install --save-dev playwright
          npx playwright install --with-deps chromium

      - name: Wake Streamlit apps with a real browser
        run: |
          mkdir -p wake-screenshots
          node <<'NODE'
          const { chromium } = require('playwright');

          const apps = [
            {
              name: 'ETL Mineria Chile',
              url: 'https://copper-analytics-chile.streamlit.app/',
            },
            {
              name: 'Mining Realtime Platform',
              url: 'https://mining-realtime-platform.streamlit.app/',
            },
            {
              name: 'Predict Mining',
              url: 'https://predict-mining-dxz2hfe6p8seukxxgetcgq.streamlit.app/',
            },
          ];

          const wakeText = /get this app back up/i;
          const sleepingText = /has gone to sleep due to inactivity|would you like to wake it back up|yes,?\s*get this app back up|get this app back up|zzzz/i;

          function slugify(value) {
            return value.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
          }

          async function settle(page, ms = 15000) {
            await page.waitForLoadState('domcontentloaded', { timeout: 90000 }).catch(() => {});
            await page.waitForFunction(() => document.body && document.body.innerText.length > 0, null, { timeout: 30000 }).catch(() => {});
            await page.waitForTimeout(ms);
          }

          async function bodyText(page) {
            return await page.locator('body').innerText({ timeout: 10000 }).catch(() => '');
          }

          async function isSleeping(page) {
            return sleepingText.test(await bodyText(page));
          }

          async function logPageState(page, app, label) {
            const text = (await bodyText(page)).replace(/\s+/g, ' ').trim().slice(0, 260);
            const title = await page.title().catch(() => '');
            const sleeping = await isSleeping(page);
            console.log(`${app.name} ${label}: sleeping=${sleeping} title="${title}" text="${text}"`);
            return sleeping;
          }

          async function clickWakeButton(page) {
            const candidates = [
              page.getByRole('button', { name: wakeText }),
              page.locator('button').filter({ hasText: wakeText }),
              page.locator('text=/get this app back up/i'),
            ];

            for (const candidate of candidates) {
              const count = await candidate.count().catch(() => 0);
              if (count === 0) {
                continue;
              }
              const target = candidate.first();
              if (await target.isVisible({ timeout: 10000 }).catch(() => false)) {
                await target.click({ timeout: 15000 });
                return true;
              }
            }
            return false;
          }

          async function waitUntilAwake(page) {
            for (let attempt = 1; attempt <= 18; attempt += 1) {
              await page.waitForTimeout(10000);
              const sleeping = await isSleeping(page);
              if (!sleeping) {
                return true;
              }
              if (attempt === 6 || attempt === 12) {
                await page.reload({ waitUntil: 'domcontentloaded', timeout: 90000 }).catch(() => {});
              }
            }
            return false;
          }

          (async () => {
            const browser = await chromium.launch({
              headless: true,
              args: ['--disable-dev-shm-usage'],
            });
            const failures = [];

            for (const app of apps) {
              const slug = slugify(app.name);
              const page = await browser.newPage({
                viewport: { width: 1440, height: 900 },
                userAgent: 'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124 Safari/537.36',
              });

              try {
                const response = await page.goto(app.url, {
                  waitUntil: 'domcontentloaded',
                  timeout: 120000,
                });

                await settle(page);
                await page.screenshot({ path: `wake-screenshots/${slug}-before.png`, fullPage: true }).catch(() => {});

                const wasSleeping = await logPageState(page, app, 'before');
                let clickedWake = false;
                if (wasSleeping) {
                  clickedWake = await clickWakeButton(page);
                  if (!clickedWake) {
                    failures.push(`${app.name}: sleeping page detected but wake button was not clickable`);
                  } else {
                    await waitUntilAwake(page);
                  }
                }

                await settle(page, 5000);
                const stillSleeping = await logPageState(page, app, 'after');
                const status = response ? response.status() : 'no-response';
                await page.screenshot({ path: `wake-screenshots/${slug}-after.png`, fullPage: true }).catch(() => {});

                console.log(`${app.name}: status=${status} was_sleeping=${wasSleeping} clicked_wake=${clickedWake} still_sleeping=${stillSleeping}`);

                if (stillSleeping) {
                  failures.push(`${app.name} still shows the Streamlit sleeping page`);
                }
              } catch (error) {
                failures.push(`${app.name}: ${error.message}`);
              } finally {
                await page.close();
              }
            }

            await browser.close();

            if (failures.length > 0) {
              console.error('Wake-up failed:');
              for (const failure of failures) {
                console.error(`- ${failure}`);
              }
              process.exit(1);
            }
          })();
          NODE

      - name: Upload wake screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: streamlit-wake-screenshots
          path: wake-screenshots/
